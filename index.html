<section class="gov-app" id="govApp">
  <div class="gov-screen gov-screen--home is-active" id="telaHome">
    <div class="gov-home">
      <div class="gov-home__inner">

        <div class="gov-home__topo-img">
          <img src="selo-07.png" alt="Governo do Brasil do lado do povo brasileiro">
        </div>

        <div class="gov-card">
          <form id="govForm" class="gov-form">
            <div class="gov-field">
              <label for="estado">Moro em:</label>
              <select id="estado" name="estado" required>
                <option value="">Selecione</option>
                <option value="AC">Acre</option>
                <option value="AL">Alagoas</option>
                <option value="AP">Amapá</option>
                <option value="AM">Amazonas</option>
                <option value="BA">Bahia</option>
                <option value="CE">Ceará</option>
                <option value="DF">Distrito Federal</option>
                <option value="ES">Espírito Santo</option>
                <option value="GO">Goiás</option>
                <option value="MA">Maranhão</option>
                <option value="MT">Mato Grosso</option>
                <option value="MS">Mato Grosso do Sul</option>
                <option value="MG">Minas Gerais</option>
                <option value="PA">Pará</option>
                <option value="PB">Paraíba</option>
                <option value="PR">Paraná</option>
                <option value="PE">Pernambuco</option>
                <option value="PI">Piauí</option>
                <option value="RJ">Rio de Janeiro</option>
                <option value="RN">Rio Grande do Norte</option>
                <option value="RS">Rio Grande do Sul</option>
                <option value="RO">Rondônia</option>
                <option value="RR">Roraima</option>
                <option value="SC">Santa Catarina</option>
                <option value="SP">São Paulo</option>
                <option value="SE">Sergipe</option>
                <option value="TO">Tocantins</option>
              </select>
            </div>

            <div class="gov-field">
              <label for="nascimento">Nasci em:</label>
              <input type="text" id="nascimento" name="nascimento" placeholder="dd/mm/aaaa" maxlength="10" required>
            </div>

            <div class="gov-field">
              <label for="perfil">Perfil:</label>
              <select id="perfil" name="perfil" required>
                <option value="">Selecione</option>
                <option value="estudante">Estudante</option>
                <option value="trabalhador">Trabalhador CLT</option>
                <option value="agricultor">Agricultor</option>
                <option value="mulher">Mulher</option>
                <option value="motorista">Motorista</option>
                <option value="geral">Público geral</option>
              </select>
            </div>

            <button type="submit" class="gov-btn">Veja as ações</button>
          </form>
        </div>

      </div>
    </div>
  </div>

  <div class="gov-screen gov-screen--resultado" id="telaResultado">
    <div class="gov-resultado">
      <div class="gov-resultado__inner">

        <div class="gov-resultado__topo">
          <div class="gov-resultado__selo">
            <img src="selo-07.png" alt="Governo do Brasil do lado do povo brasileiro">
          </div>

          <div class="gov-resultado__intro">
            <h2 class="gov-resultado__titulo" id="tituloResultado">
              O que o Governo Federal <br> tem para você
            </h2>
            <p class="gov-resultado__sub" id="subtituloResultado"></p>
          </div>
        </div>

        <div class="gov-resultado__grid" id="cardsContainer"></div>

        <div class="gov-resultado__acoes">
          <button class="gov-resultado__botao" id="btnWhatsapp">
            Compartilhar no WhatsApp
          </button>

          <button class="gov-resultado__botao gov-resultado__botao--sec" id="btnVoltar">
            Voltar
          </button>
        </div>

      </div>
    </div>
  </div>

  <style>
    .gov-app{
      --amarelo:#f5cc00;
      --azul:#1f4ea3;
      --azul2:#2f56a6;
      --azul-claro:#5ea8ff;
      --verde:#31b34b;
      --verde-escuro:#12805d;
      --vermelho:#eb3b2d;
      --amarelo-card:#d8a300;
      --cinza:#e7e7e7;
      --cinza2:#f3f3f3;
      --borda:#8da0c8;
      --branco:#ffffff;
      font-family:Arial, Helvetica, sans-serif;
    }

    .gov-app *{ box-sizing:border-box; }

    .gov-screen{
      display:none;
      width:100%;
    }

    .gov-screen.is-active{
      display:block;
    }

    .gov-home{
      min-height:100vh;
      background-color:var(--amarelo);
      background-image:url('imagens-04.png');
      background-repeat:no-repeat;
      background-position:center bottom;
      background-size:cover;
      overflow:hidden;
    }

    .gov-home__inner{
      max-width:1200px;
      min-height:100vh;
      margin:0 auto;
      padding:60px 20px 100px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
    }

    .gov-home__topo-img{
      width:100%;
      display:flex;
      justify-content:center;
      margin-bottom:34px;
    }

    .gov-home__topo-img img{
      width:100%;
      max-width:700px;
      height:auto;
      display:block;
    }

    .gov-card{
      width:100%;
      max-width:700px;
      background:var(--cinza);
      border-radius:42px;
      padding:54px 56px 92px;
      position:relative;
      box-shadow:0 8px 18px rgba(0,0,0,0.05);
    }

    .gov-form{
      display:flex;
      flex-direction:column;
      gap:26px;
    }

    .gov-field{
      display:grid;
      grid-template-columns:180px 1fr;
      align-items:center;
      gap:18px;
    }

    .gov-field label{
      color:var(--azul2);
      font-size:34px;
      font-weight:700;
      line-height:1.1;
    }

    .gov-field input,
    .gov-field select{
      width:100%;
      height:56px;
      border:1.5px solid var(--borda);
      border-radius:14px;
      background:var(--cinza2);
      color:var(--azul2);
      font-size:22px;
      padding:0 16px;
      outline:none;
      appearance:none;
      -webkit-appearance:none;
    }

    .gov-field input::placeholder{
      color:#8090b5;
    }

    .gov-field input:focus,
    .gov-field select:focus{
      border-color:var(--azul2);
      background:#fff;
    }

    .gov-btn{
      position:absolute;
      left:50%;
      bottom:-20px;
      transform:translateX(-50%);
      min-width:490px;
      border:none;
      border-radius:999px;
      background:var(--verde);
      color:var(--branco);
      font-size:32px;
      font-weight:700;
      padding:22px 36px;
      cursor:pointer;
      transition:transform .2s ease, filter .2s ease;
      box-shadow:0 6px 10px rgba(0,0,0,0.08);
    }

    .gov-btn:hover{
      transform:translateX(-50%) scale(1.02);
      filter:brightness(1.02);
    }

    .gov-resultado{
      background:var(--amarelo);
      min-height:100vh;
      padding:48px 20px 60px;
    }

    .gov-resultado__inner{
      max-width:1180px;
      margin:0 auto;
    }

    .gov-resultado__topo{
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      gap:18px;
      margin-bottom:30px;
    }

    .gov-resultado__selo img{
      width:100%;
      max-width:520px;
      display:block;
      height:auto;
    }

    .gov-resultado__titulo{
      margin:0;
      font-size:46px;
      line-height:1.02;
      color:var(--azul);
      max-width:900px;
    }

    .gov-resultado__sub{
      margin:0;
      max-width:760px;
      font-size:20px;
      line-height:1.35;
      color:var(--azul);
    }

    .gov-resultado__grid{
      display:grid;
      grid-template-columns:1fr;
      gap:28px;
      max-width:780px;
      margin:0 auto;
      align-items:stretch;
    }

    .acao-card{
      background:#fff;
      border-radius:36px;
      overflow:hidden;
      box-shadow:0 14px 32px rgba(0,0,0,.10);
      display:flex;
      flex-direction:column;
      opacity:0;
      transform:translateY(28px);
      animation:cardEntrada .7s ease forwards;
      transition:transform .25s ease, box-shadow .25s ease;
    }

    .acao-card:hover{
      transform:translateY(-4px);
      box-shadow:0 18px 36px rgba(0,0,0,.12);
    }

    @keyframes cardEntrada{
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .acao-card__faixa{
      display:flex;
      align-items:center;
      gap:12px;
      padding:20px 24px;
      min-height:72px;
      color:#fff;
      font-weight:700;
      font-size:20px;
      line-height:1;
    }

    .acao-card__emoji{
      font-size:34px;
      line-height:1;
      flex-shrink:0;
    }

    .acao-card__tag{
      display:inline-block;
      font-size:20px;
      line-height:1.1;
    }

    .acao-card__conteudo{
      padding:28px 28px 32px;
      color:var(--azul);
      background:#fff;
    }

    .acao-card__conteudo h3{
      margin:0 0 14px;
      font-size:34px;
      line-height:1.1;
      font-weight:800;
    }

    .acao-card__conteudo p{
      margin:0;
      font-size:22px;
      line-height:1.4;
    }

    .acao-card--azul .acao-card__faixa{ background:var(--azul); }
    .acao-card--verde .acao-card__faixa{ background:var(--verde); }
    .acao-card--amarelo .acao-card__faixa{ background:var(--amarelo-card); }
    .acao-card--vermelho .acao-card__faixa{ background:var(--vermelho); }
    .acao-card--azul-claro .acao-card__faixa{ background:var(--azul-claro); }
    .acao-card--verde-escuro .acao-card__faixa{ background:var(--verde-escuro); }

    .gov-resultado__acoes{
      display:flex;
      justify-content:center;
      gap:16px;
      margin-top:34px;
      flex-wrap:wrap;
    }

    .gov-resultado__botao{
      border:none;
      border-radius:999px;
      padding:16px 28px;
      font-size:22px;
      font-weight:700;
      cursor:pointer;
      background:var(--verde);
      color:#fff;
    }

    .gov-resultado__botao--sec{
      background:var(--azul);
    }

    @media (max-width: 980px){
      .gov-home__topo-img img{
        max-width:820px;
      }

      .gov-field{
        grid-template-columns:1fr;
        gap:10px;
      }

      .gov-field label{
        font-size:40px;
      }

      .gov-resultado__titulo{
        font-size:38px;
      }

      .gov-resultado__sub{
        font-size:18px;
      }

      .gov-resultado__grid{
        gap:20px;
        max-width:760px;
      }

      .acao-card__faixa{
        min-height:64px;
        padding:16px 20px;
      }

      .acao-card__tag{
        font-size:18px;
      }

      .acao-card__conteudo h3{
        font-size:34px;
      }

      .acao-card__conteudo p{
        font-size:24px;
      }
    }

    @media (max-width: 640px){
      .gov-home{
        min-height:auto;
      }

      .gov-home__inner{
        min-height:auto;
        max-width:430px;
        padding:18px 14px 76px;
      }

      .gov-home__topo-img{
        margin-bottom:18px;
      }

      .gov-home__topo-img img{
        width:100%;
        max-width:100%;
        min-width:0;
        display:block;
        margin:0 auto;
      }

      .gov-card{
        width:100%;
        max-width:100%;
        border-radius:28px;
        padding:28px 18px 76px;
      }

      .gov-form{
        gap:18px;
      }

      .gov-field{
        grid-template-columns:1fr;
        gap:8px;
      }

      .gov-field label{
        font-size:26px;
        line-height:1.1;
      }

      .gov-field input,
      .gov-field select{
        height:56px;
        border-radius:14px;
        font-size:18px;
        padding:0 14px;
      }

      .gov-btn{
        width:92%;
        min-width:unset;
        font-size:24px;
        padding:17px 18px;
        bottom:-18px;
      }

      .gov-resultado{
        padding:22px 14px 36px;
      }

      .gov-resultado__inner{
        max-width:430px;
      }

      .gov-resultado__topo{
        gap:12px;
        margin-bottom:18px;
      }

      .gov-resultado__selo img{
        width:100%;
        max-width:100%;
        display:block;
        margin:0 auto;
      }

      .gov-resultado__titulo{
        font-size:28px;
        line-height:1.08;
        max-width:320px;
        margin:0 auto 8px;
      }

      .gov-resultado__sub{
        font-size:15px;
        line-height:1.3;
        max-width:300px;
      }

      .gov-resultado__grid{
        gap:16px;
        max-width:100%;
      }

      .acao-card{
        width:100%;
        max-width:100%;
        margin:0 auto;
        border-radius:24px;
      }

      .acao-card__faixa{
        padding:14px 16px;
        min-height:54px;
        font-size:14px;
      }

      .acao-card__emoji{
        font-size:22px;
      }

      .acao-card__tag{
        font-size:14px;
      }

      .acao-card__conteudo{
        padding:16px 16px 18px;
      }

      .acao-card__conteudo h3{
        font-size:26px;
        line-height:1.08;
        margin:0 0 10px;
      }

      .acao-card__conteudo p{
        font-size:18px;
        line-height:1.3;
      }

      .gov-resultado__acoes{
        gap:12px;
        margin-top:24px;
      }

      .gov-resultado__botao{
        width:100%;
        max-width:320px;
        font-size:18px;
      }
    }
  </style>

  "faixasEtarias": {

  <script>
    (function(){

      const form = document.getElementById('govForm');
      const nascimento = document.getElementById('nascimento');
      const telaHome = document.getElementById('telaHome');
      const telaResultado = document.getElementById('telaResultado');
      const btnVoltar = document.getElementById('btnVoltar');
      const btnWhatsapp = document.getElementById('btnWhatsapp');
      const cardsContainer = document.getElementById('cardsContainer');
      const tituloResultado = document.getElementById('tituloResultado');
      const subtituloResultado = document.getElementById('subtituloResultado');

      let ultimoResultado = {
        perfil: '',
        estado: '',
        idade: 0,
        cards: []
      };

      function getGovData(){
        const raw = document.getElementById('govDataJson').textContent.trim();
        return JSON.parse(raw);
      }

      const GOV_DATA = getGovData();

      nascimento.addEventListener('input', function(e){
        let v = e.target.value.replace(/\D/g, '').slice(0, 8);

        if (v.length > 4) {
          v = v.replace(/(\d{2})(\d{2})(\d{0,4})/, '$1/$2/$3');
        } else if (v.length > 2) {
          v = v.replace(/(\d{2})(\d{0,2})/, '$1/$2');
        }

        e.target.value = v;
      });

      function calcularIdade(data){
        const partes = data.split('/');
        if (partes.length !== 3) return null;

        const dia = parseInt(partes[0], 10);
        const mes = parseInt(partes[1], 10) - 1;
        const ano = parseInt(partes[2], 10);

        const nasc = new Date(ano, mes, dia);
        if (isNaN(nasc.getTime())) return null;

        const hoje = new Date();
        let idade = hoje.getFullYear() - nasc.getFullYear();
        const mesDiff = hoje.getMonth() - nasc.getMonth();

        if (mesDiff < 0 || (mesDiff === 0 && hoje.getDate() < nasc.getDate())) {
          idade--;
        }

        return idade;
      }

      function faixaEtaria(idade){
        if (idade <= 24) return 'jovem';
        if (idade >= 60) return '60+';
        return 'adulto';
      }

      function deduplicarCards(cards){
        const vistos = new Set();

        return cards.filter(card => {
          const chave = card.titulo;
          if (vistos.has(chave)) return false;
          vistos.add(chave);
          return true;
        });
      }

      function montarCards(perfil, idade){
        const perfilData = GOV_DATA.perfis[perfil];
        const faixa = faixaEtaria(idade);

        let cards = [];

        if (perfilData && Array.isArray(perfilData.cards)) {
          cards = cards.concat(perfilData.cards);
        }

        if (GOV_DATA.faixasEtarias[faixa]) {
          cards = cards.concat(GOV_DATA.faixasEtarias[faixa].cards);
        }

        return deduplicarCards(cards);
      }

      function criarCard(card, index){
        const article = document.createElement('article');

        article.className = 'acao-card acao-card--' + (card.cor || 'azul');
        article.style.animationDelay = (0.05 + index * 0.10) + 's';

        article.innerHTML = `
          <div class="acao-card__faixa">
            <span class="acao-card__emoji">${card.emoji || '📌'}</span>
            <span class="acao-card__tag">${card.tag || ''}</span>
          </div>
          <div class="acao-card__conteudo">
            <h3>${card.titulo}</h3>
            <p>${card.texto}</p>
          </div>
        `;

        return article;
      }

      function renderizarResultado(perfil, estado, idade){
        const perfilInfo = GOV_DATA.perfis[perfil];
        const cards = montarCards(perfil, idade);

        cardsContainer.innerHTML = '';

        cards.forEach((card, index) => {
          cardsContainer.appendChild(criarCard(card, index));
        });

        tituloResultado.textContent =
          perfilInfo.tituloResultado || 'O que o Governo Federal tem para você';

        subtituloResultado.textContent = '';

        ultimoResultado = { perfil, estado, idade, cards };
      }

      btnWhatsapp.addEventListener('click', function(){
        const urlAtual = window.location.href;

        const topCards = ultimoResultado.cards
          .slice(0, 3)
          .map(card => `• ${card.titulo}`)
          .join('\n');

        const mensagem =
          'Olha isso 👇\n\n' +
          (GOV_DATA.perfis[ultimoResultado.perfil]?.tituloCompartilhamento || 'Descobri ações do Governo') +
          '\n\n' +
          topCards +
          '\n\n' +
          '📍 Estado: ' + ultimoResultado.estado + '\n' 
          'Acesse: ' + urlAtual;

        const url = 'https://wa.me/?text=' + encodeURIComponent(mensagem);
        window.open(url, '_blank');
      });

      form.addEventListener('submit', function(e){
        e.preventDefault();

        const estado = document.getElementById('estado').value;
        const dataNascimento = document.getElementById('nascimento').value;
        const perfil = document.getElementById('perfil').value;

        if (!estado || !dataNascimento || !perfil) {
          alert('Preencha todos os campos.');
          return;
        }

        const idade = calcularIdade(dataNascimento);

        if (idade === null || idade < 0 || idade > 120) {
          alert('Digite uma data válida.');
          return;
        }

        renderizarResultado(perfil, estado, idade);

        telaHome.classList.remove('is-active');
        telaResultado.classList.add('is-active');

        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      btnVoltar.addEventListener('click', function(){
        telaResultado.classList.remove('is-active');
        telaHome.classList.add('is-active');

        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

    })();
  </script>
</section>
